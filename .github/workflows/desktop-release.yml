name: Desktop Release

on:
  push:
    tags:
      - "v*"
      - "desktop-v*"
      - "desktop-linux-v*"

  # Keep the existing manual desktop release/build entry point.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build (e.g. v0.1.0)"
        required: true
        type: string
      checkout_ref:
        description: "Optional branch/ref to checkout while using tag for release metadata."
        required: false
        default: ""
        type: string
      publish:
        description: "Publish built artifacts to GitHub Releases."
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      rollout_hours:
        description: "Linear rollout duration in hours. Use 0 for instant rollout."
        required: false
        default: "36"
        type: string

  # Publish the Arch Linux package to the personal Pacman repository only
  # after a GitHub Release has been published.
  release:
    types:
      - published

# Default to read-only. Jobs that create releases or upload assets opt in to write access.
permissions:
  contents: read

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

env:
  SOURCE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
  CHECKOUT_REF: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event_name == 'workflow_dispatch' && (github.event.inputs.checkout_ref || github.ref_name) || github.ref_name }}
  SHOULD_PUBLISH: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.publish != 'false' }}
  ROLLOUT_HOURS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.rollout_hours || '36' }}
  DESKTOP_PACKAGE_PATH: "packages/desktop"

  # Personal Pacman repository settings.
  ARCH_PACKAGE_NAME: "paseo-desktop-bin"
  PACMAN_REPOSITORY: "JasonLandbridge/Arch-Linux-AUR-Repository"
  PACMAN_REPOSITORY_PATH: "pacman-repo"
  PACMAN_REPOSITORY_BRANCH: "master"
  PACMAN_ARCH: "x86_64"
  PACMAN_DATABASE_NAME: "jason"

jobs:
  create-release:
    # Keep existing release creation behavior for tag pushes/manual runs only.
    # release.published means the release already exists, so this job should not run then.
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish != 'false') }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      # Checkout only the scripts needed to resolve release metadata.
      - uses: actions/checkout@v4
        with:
          sparse-checkout: scripts
          ref: ${{ env.CHECKOUT_REF }}

      # Derive RELEASE_TAG, DESKTOP_VERSION, RELEASE_CHANNEL, and related metadata.
      - name: Resolve release metadata
        shell: bash
        run: node scripts/emit-release-env.mjs --source-tag "$SOURCE_TAG" >> "$GITHUB_ENV"

      # Create the GitHub Release when it does not already exist.
      - name: Create GitHub release
        if: env.IS_SMOKE_TAG != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists, skipping creation"
          else
            prerelease_flag=""
            if [[ "$IS_PRERELEASE" == "true" ]]; then
              prerelease_flag="--prerelease"
            fi
            gh release create "$RELEASE_TAG" \
              --repo "${{ github.repository }}" \
              --title "Paseo $RELEASE_TAG" \
              --notes "" \
              $prerelease_flag || {
                echo "Release creation raced with another workflow; continuing."
              }
          fi

  publish-linux:
    needs: [create-release]
    # Keep the existing Linux desktop release behavior. The new Pacman publishing job runs
    # separately on release.published and does not change this release build path.
    if: ${{ always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped') && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (startsWith(github.ref_name, 'v') || startsWith(github.ref_name, 'desktop-v') || startsWith(github.ref_name, 'desktop-linux-v')))) }}
    permissions:
      contents: write
      packages: read
    runs-on: ubuntu-22.04

    steps:
      # Checkout the source at the requested release/tag ref.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.CHECKOUT_REF }}

      # Resolve release metadata used by the desktop build and upload steps.
      - name: Resolve release metadata
        shell: bash
        run: node scripts/emit-release-env.mjs --source-tag "$SOURCE_TAG" >> "$GITHUB_ENV"

      # Install Node.js using the maintained setup-node action.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json
          registry-url: "https://npm.pkg.github.com"
          scope: "@boudra"

      # Install workspace dependencies.
      - name: Install JS dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Make the desktop package version match the release tag.
      - name: Set desktop package version from tag
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const version = process.env.DESKTOP_VERSION;
          if (!version) throw new Error('DESKTOP_VERSION env var is missing');

          const packageJsonPath = path.join(process.env.DESKTOP_PACKAGE_PATH, 'package.json');
          const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, 'utf8'));
          packageJson.version = version;
          fs.writeFileSync(packageJsonPath, `${JSON.stringify(packageJson, null, 2)}\n`);
          NODE

      # Existing Linux smoke/display dependency.
      - name: Install Linux smoke display
        run: sudo apt-get update && sudo apt-get install -y xvfb

      # Build the existing Linux desktop artifacts.
      - name: Build desktop release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EP_GH_IGNORE_TIME: true
          PASEO_DESKTOP_SMOKE: "1"
        run: |
          set -euo pipefail
          build_args=(-- --publish never --linux --x64)
          build_args+=("-c.publish.releaseType=$RELEASE_TYPE")
          build_args+=("-c.publish.channel=$RELEASE_CHANNEL")
          npm run build:desktop "${build_args[@]}"

      # Upload normal Linux release artifacts to the GitHub Release.
      - name: Upload desktop artifacts to release
        if: env.SHOULD_PUBLISH == 'true' && env.IS_SMOKE_TAG != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          release_dir="${DESKTOP_PACKAGE_PATH}/release"
          files=()
          while IFS= read -r -d '' f; do
            files+=("$f")
          done < <(find "$release_dir" -maxdepth 1 -type f ! -name '*.yml' -print0 | sort -z)
          if (( ${#files[@]} == 0 )); then
            echo "::error::No release artifacts found in $release_dir"
            exit 1
          fi
          gh release upload "$RELEASE_TAG" "${files[@]}" --clobber --repo "${{ github.repository }}"

      # If publishing is disabled, keep artifacts attached to the workflow run.
      - name: Upload desktop artifacts to workflow
        if: env.SHOULD_PUBLISH != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: ${{ env.DESKTOP_PACKAGE_PATH }}/release/*
          retention-days: 7

      # Upload the Linux update manifest for the rollout finalization job.
      - name: Upload manifest artifact
        if: env.SHOULD_PUBLISH == 'true' && env.IS_SMOKE_TAG != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: linux-manifest
          path: ${{ env.DESKTOP_PACKAGE_PATH }}/release/${{ env.RELEASE_CHANNEL }}-linux.yml
          retention-days: 1

  finalize-rollout:
    needs: [publish-linux]
    # Only finalize rollout for the original tag/manual release flows. Without this guard,
    # release.published would run with no manifest artifact from publish-linux.
    if: ${{ always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (needs.publish-linux.result == 'success' || needs.publish-linux.result == 'skipped') && (github.event_name != 'workflow_dispatch' || github.event.inputs.publish != 'false') }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    concurrency:
      group: desktop-rollout-${{ github.event.inputs.tag || github.ref_name }}
      cancel-in-progress: false

    steps:
      # Checkout only what is needed to stamp and upload manifests.
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            package.json
            package-lock.json
            scripts
          ref: ${{ env.CHECKOUT_REF }}

      # Resolve release metadata for manifest naming and upload.
      - name: Resolve release tag
        shell: bash
        run: node scripts/emit-release-env.mjs --source-tag "$SOURCE_TAG" >> "$GITHUB_ENV"

      # Install Node.js for the manifest stamping scripts.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json
          registry-url: "https://npm.pkg.github.com"
          scope: "@boudra"

      # Install dependencies required by the manifest scripts.
      - name: Install JS dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Download the Linux manifest generated by publish-linux.
      - name: Download Linux manifest artifact
        if: env.IS_SMOKE_TAG != 'true' && needs.publish-linux.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: linux-manifest
          path: release-manifests/linux-manifest

      # Stamp rollout metadata and upload the final manifest to the GitHub Release.
      - name: Assemble and upload stamped manifests
        if: env.IS_SMOKE_TAG != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          cd release-manifests
          manifests_dir="$PWD/final"
          mkdir -p "$manifests_dir"

          if [[ "${{ needs.publish-linux.result }}" == "success" ]]; then
            cp "linux-manifest/${RELEASE_CHANNEL}-linux.yml" "$manifests_dir/"
          fi

          shopt -s nullglob
          files=( "$manifests_dir"/*.yml )
          if (( ${#files[@]} == 0 )); then
            echo "::error::No manifest artifacts were available to publish"
            exit 1
          fi
          timestamp="$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")"
          node ../scripts/stamp-rollout.mjs --release-date "$timestamp" --rollout-hours "$ROLLOUT_HOURS" "${files[@]}"
          ROLLOUT_HOURS_EXPECTED="$ROLLOUT_HOURS" RELEASE_DATE_EXPECTED="$timestamp" node -e '
            const yaml = require("js-yaml");
            const fs = require("fs");
            const expectedHours = Number(process.env.ROLLOUT_HOURS_EXPECTED);
            const expectedDate = process.env.RELEASE_DATE_EXPECTED;
            if (!Number.isFinite(expectedHours) || expectedHours < 0) {
              throw new Error(`expected non-negative rolloutHours, got ${process.env.ROLLOUT_HOURS_EXPECTED}`);
            }
            for (const f of process.argv.slice(1)) {
              const m = yaml.load(fs.readFileSync(f, "utf8")) ?? {};
              if (m.rolloutHours !== expectedHours) {
                throw new Error(`${f}: rolloutHours=${m.rolloutHours}, expected ${expectedHours}`);
              }
              if (m.releaseDate !== expectedDate) {
                throw new Error(`${f}: releaseDate=${m.releaseDate}, expected ${expectedDate}`);
              }
              if (typeof m.version !== "string" || m.version.length === 0) {
                throw new Error(`${f}: missing or invalid version`);
              }
            }
          ' "${files[@]}"
          gh release upload "$RELEASE_TAG" "${files[@]}" --clobber --repo "${{ github.repository }}"

  publish-arch-pacman:
    needs: [publish-linux]
    # Reuse the exact .deb asset from the published GitHub Release and repack it
    # like the AUR paseo-desktop-bin package. This does not rebuild Paseo.
    # Run either on release.published events or after a tag/manual desktop build has
    # uploaded release assets. `always()` is required so release.published can run
    # even though publish-linux is intentionally skipped for that event.
    if: ${{ always() && (github.event_name == 'release' || (needs.publish-linux.result == 'success' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish != 'false')))) }}
    permissions:
      contents: read
    runs-on: ubuntu-latest

    # Use an Arch container so makepkg, repo-add, and Pacman tooling are native/current.
    container:
      image: archlinux:base-devel

    # Serialize writes to the Pacman repository so release events cannot race each other.
    concurrency:
      group: arch-pacman-repository
      cancel-in-progress: false

    steps:
      # Install only the tools needed to download the release asset, repackage the .deb,
      # regenerate Pacman metadata, and run maintained GitHub JavaScript actions.
      - name: Install Arch packaging dependencies
        shell: bash
        run: |
          set -euo pipefail
          pacman -Syu --noconfirm --needed \
            binutils \
            ca-certificates \
            fakeroot \
            git \
            github-cli \
            nodejs \
            tar \
            xz \
            zstd

      # Convert the published release tag into the upstream version and the Arch pkgver.
      - name: Resolve release asset names
        shell: bash
        run: |
          set -euo pipefail

          release_tag="${SOURCE_TAG}"
          version="$release_tag"
          version="${version#desktop-linux-v}"
          version="${version#desktop-v}"
          version="${version#v}"

          if [[ -z "$version" || "$version" == "$release_tag" ]]; then
            echo "::error::Could not derive a version from release tag '$release_tag'"
            exit 1
          fi

          arch_pkgver="${version//-/_}"
          deb_asset="Paseo-${version}-amd64.deb"

          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"
          echo "DESKTOP_VERSION=$version" >> "$GITHUB_ENV"
          echo "ARCH_PKGVER=$arch_pkgver" >> "$GITHUB_ENV"
          echo "DEB_ASSET=$deb_asset" >> "$GITHUB_ENV"

          echo "Release tag: $release_tag"
          echo "Release asset: $deb_asset"
          echo "Arch package version: $arch_pkgver"

      # Download the .deb that was already uploaded to the published GitHub Release.
      # The retry loop handles the normal race where the release event can arrive before
      # all release assets are visible through the GitHub API.
      - name: Download published release .deb asset
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          mkdir -p release-assets

          for attempt in {1..60}; do
            echo "Attempt $attempt: downloading $DEB_ASSET from release $RELEASE_TAG"
            if gh release download "$RELEASE_TAG" \
              --repo "${{ github.repository }}" \
              --pattern "$DEB_ASSET" \
              --dir release-assets \
              --clobber; then
              break
            fi

            if (( attempt == 60 )); then
              echo "::error::Release asset $DEB_ASSET was not available after waiting."
              gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" --json assets --jq '.assets[].name' || true
              exit 1
            fi

            sleep 30
          done

          test -f "release-assets/$DEB_ASSET"
          echo "DEB_ASSET_PATH=${GITHUB_WORKSPACE}/release-assets/${DEB_ASSET}" >> "$GITHUB_ENV"

      # Repackage the downloaded .deb into an Arch package using the same basic approach
      # as the AUR paseo-desktop-bin PKGBUILD: extract usr/ and opt/ from the .deb.
      - name: Repackage release .deb as Arch package
        shell: bash
        run: |
          set -euo pipefail

          build_dir="${GITHUB_WORKSPACE}/arch-package-build"
          rm -rf "$build_dir"
          mkdir -p "$build_dir"

          cp "$DEB_ASSET_PATH" "$build_dir/$DEB_ASSET"
          deb_sha256="$(sha256sum "$build_dir/$DEB_ASSET" | awk '{print $1}')"

          cat > "$build_dir/PKGBUILD" <<PKGBUILD
          pkgname="${ARCH_PACKAGE_NAME}"
          pkgver="${ARCH_PKGVER}"
          pkgrel=1
          pkgdesc="One interface for all your Claude Code, Codex and OpenCode agents."
          arch=("x86_64")
          url="https://paseo.sh"
          license=("AGPL-3.0-only")
          makedepends=("binutils" "tar")
          depends=(libxkbcommon libxcb libgcc gtk3 libxext libx11 libcups nspr mesa dbus pango libxcomposite libxrandr nodejs glib2 nss libxdamage alsa-lib systemd-libs bash hicolor-icon-theme cairo at-spi2-core expat libstdc++ libxfixes)
          provides=("paseo=\${pkgver}")
          conflicts=(paseo paseo-bin paseo-appimage)
          _upstream_version="${DESKTOP_VERSION}"
          source=("Paseo-\${_upstream_version}-amd64.deb")
          sha256sums=("${deb_sha256}")

          prepare() {
            local deb="Paseo-\${_upstream_version}-amd64.deb"
            local data_member
            data_member="\$(ar t "\$deb" | grep -E '^data[.]tar[.](xz|zst|gz)$' | head -n1)"

            case "\$data_member" in
              data.tar.xz) ar p "\$deb" "\$data_member" | tar -xJ ;;
              data.tar.zst) ar p "\$deb" "\$data_member" | tar --zstd -x ;;
              data.tar.gz) ar p "\$deb" "\$data_member" | tar -xz ;;
              *) echo "Unsupported or missing deb data archive: \$data_member" >&2; return 1 ;;
            esac
          }

          package() {
            cd "\$srcdir"
            cp -R usr "\$pkgdir"
            cp -R opt "\$pkgdir"
          }
          PKGBUILD

          sed -i 's/^          //' "$build_dir/PKGBUILD"

          useradd -m builder
          chown -R builder:builder "$build_dir"
          runuser -u builder -- bash -lc "cd '$build_dir' && makepkg --force --clean --nodeps --noconfirm"

          mapfile -t packages < <(find "$build_dir" -maxdepth 1 -type f -name "${ARCH_PACKAGE_NAME}-*.pkg.tar.zst" | sort)
          if (( ${#packages[@]} != 1 )); then
            printf '::error::Expected exactly one rebuilt Arch package, found %s\n' "${#packages[@]}"
            printf '%s\n' "${packages[@]}"
            exit 1
          fi

          package_path="$(realpath "${packages[0]}")"
          package_name="$(basename "$package_path")"

          echo "ARCH_PACKAGE_PATH=$package_path" >> "$GITHUB_ENV"
          echo "ARCH_PACKAGE_BASENAME=$package_name" >> "$GITHUB_ENV"
          echo "Repackaged Arch package: $package_name"

      # Checkout the personal Pacman repository using the fine-grained PAT stored in REPO_TOKEN.
      - name: Checkout personal Pacman repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PACMAN_REPOSITORY }}
          token: ${{ secrets.REPO_TOKEN }}
          path: ${{ env.PACMAN_REPOSITORY_PATH }}
          ref: ${{ env.PACMAN_REPOSITORY_BRANCH }}
          persist-credentials: true

      # Update x86_64/ in an idempotent way:
      # - keep GitHub Pages from invoking Jekyll
      # - remove older paseo-desktop-bin package versions
      # - copy the newly repackaged package
      # - regenerate jason.db.tar.gz and jason.files.tar.gz from the packages now present
      - name: Update Pacman repository metadata
        shell: bash
        run: |
          set -euo pipefail

          repo_root="${GITHUB_WORKSPACE}/${PACMAN_REPOSITORY_PATH}"
          arch_dir="${repo_root}/${PACMAN_ARCH}"

          mkdir -p "$arch_dir"

          # Disable Jekyll processing on GitHub Pages so binary/package files are served as-is.
          touch "${repo_root}/.nojekyll"

          cd "$arch_dir"

          # Remove older package versions for this package before copying the new one.
          rm -f -- "${ARCH_PACKAGE_NAME}-"*.pkg.tar.* "${ARCH_PACKAGE_NAME}-"*.pkg.tar.*.sig

          # Copy the newly repackaged package into x86_64/.
          cp "$ARCH_PACKAGE_PATH" "./$ARCH_PACKAGE_BASENAME"

          # Rebuild metadata from scratch so deleted package versions cannot remain in the DB.
          rm -f -- \
            "${PACMAN_DATABASE_NAME}.db" \
            "${PACMAN_DATABASE_NAME}.db.tar.gz" \
            "${PACMAN_DATABASE_NAME}.db.tar.gz.old" \
            "${PACMAN_DATABASE_NAME}.files" \
            "${PACMAN_DATABASE_NAME}.files.tar.gz" \
            "${PACMAN_DATABASE_NAME}.files.tar.gz.old"

          shopt -s nullglob
          packages=( *.pkg.tar.zst )

          if (( ${#packages[@]} == 0 )); then
            echo "::error::No .pkg.tar.zst files found in $arch_dir"
            exit 1
          fi

          # Required database generation command.
          repo-add "${PACMAN_DATABASE_NAME}.db.tar.gz" *.pkg.tar.zst

          # Pacman requests /x86_64/jason.db and /x86_64/jason.files. The Arch Wiki's
          # custom repository example uses symlinks from those names to the compressed
          # repo-add outputs, so keep those standard links in the Pages repository.
          ln -sfn "${PACMAN_DATABASE_NAME}.db.tar.gz" "${PACMAN_DATABASE_NAME}.db"
          ln -sfn "${PACMAN_DATABASE_NAME}.files.tar.gz" "${PACMAN_DATABASE_NAME}.files"

          echo "Updated Pacman repository contents:"
          find . -maxdepth 1 -type f -print | sort

      # Commit and push only when the Pacman repository changed. This maintained action handles
      # git add/commit/push without custom git plumbing.
      - name: Commit and push Pacman repository changes
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          repository: ${{ env.PACMAN_REPOSITORY_PATH }}
          branch: ${{ env.PACMAN_REPOSITORY_BRANCH }}
          commit_message: "chore(pacman): publish paseo-desktop-bin ${{ env.DESKTOP_VERSION }}"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          file_pattern: ".nojekyll x86_64"
